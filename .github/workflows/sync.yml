name: Weekly Supabase to Sheets Sync

on:
  schedule:
    - cron: '0 0 * * 1' # 每週一凌晨 00:00 (UTC) 自動執行
  workflow_dispatch:   # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級版本，消除警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級版本，消除警告
        with:
          python-version: '3.12' # 升級 Python 以符合 Google Auth 最新規範

      - name: Install dependencies
        run: |
          pip install psycopg2-binary gspread google-auth pandas
          # 💡 pandas 是處理歸因覆蓋邏輯的核心

      - name: Run sync script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          G_SERVICE_ACCOUNT_JSON: ${{ secrets.G_SERVICE_ACCOUNT_JSON }}
        run: python main.py
